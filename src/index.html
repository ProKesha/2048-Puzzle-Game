<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="Play the 2048 puzzle game in your browser."
    />
    <meta
      name="theme-color"
      content="#fbf8ef"
    />
    <title>2048 Puzzle Game</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23bbada0'/%3E%3Crect x='8' y='8' width='22' height='22' rx='6' fill='%23eee4da'/%3E%3Crect x='34' y='8' width='22' height='22' rx='6' fill='%23ede0c8'/%3E%3Crect x='8' y='34' width='22' height='22' rx='6' fill='%23f2b179'/%3E%3Crect x='34' y='34' width='22' height='22' rx='6' fill='%23edc22e'/%3E%3Ctext x='19' y='24' font-family='Arial, sans-serif' font-size='10' font-weight='700' text-anchor='middle' fill='%23776e65'%3E2%3C/text%3E%3Ctext x='45' y='24' font-family='Arial, sans-serif' font-size='10' font-weight='700' text-anchor='middle' fill='%23776e65'%3E4%3C/text%3E%3Ctext x='19' y='50' font-family='Arial, sans-serif' font-size='10' font-weight='700' text-anchor='middle' fill='%23f9f6f2'%3E8%3C/text%3E%3Ctext x='45' y='50' font-family='Arial, sans-serif' font-size='9' font-weight='700' text-anchor='middle' fill='%23f9f6f2'%3E2048%3C/text%3E%3C/svg%3E"
      sizes="any"
      type="image/svg+xml"
    />
    <link
      rel="shortcut icon"
      href="./favicon.png"
      sizes="32x32"
      type="image/png"
    />
    <link
      rel="icon"
      href="./favicon.png"
      sizes="32x32"
      type="image/png"
    />
    <link
      rel="stylesheet"
      href="./styles/main.scss"
    />
  </head>
  <body>
    <div class="container">
      <div class="game-header">
        <h1>2048</h1>
        <div class="controls">
          <p
            class="info"
            aria-live="polite"
            aria-atomic="true"
          >
            Score:
            <span class="game-score">0</span>
          </p>
          <button
            class="button start"
            type="button"
            aria-label="Start or restart the game"
          >
            Start
          </button>
        </div>
      </div>

      <table
        class="game-field"
        aria-label="2048 game field"
      >
        <tbody>
          <tr class="field-row">
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
          </tr>

          <tr class="field-row">
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
          </tr>

          <tr class="field-row">
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
          </tr>

          <tr class="field-row">
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
          </tr>
        </tbody>
      </table>

      <div
        class="message-container"
        aria-live="polite"
        aria-atomic="true"
      >
        <p class="message message-lose hidden">You lose! Restart the game?</p>
        <p class="message message-win hidden">Winner! Congrats! You did it!</p>
        <p class="message message-start">
          Press "Start" to begin game. Good luck!
        </p>
      </div>
    </div>
    <script
      type="module"
      src="./scripts/main.js"
    ></script>
  </body>
</html>
